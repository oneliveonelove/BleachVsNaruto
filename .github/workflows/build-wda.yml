name: Build Unsigned WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v3
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Build WebDriverAgentRunner (Unsigned)
        run: |
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            SYMROOT=$RUNNER_TEMP/Build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package IPA (Zip Payload)
        run: |
          EXPORT_DIR=$RUNNER_TEMP/Exported
          mkdir -p $EXPORT_DIR/Payload
          
          # Diagnostic print to verify build output
          echo "=== Diagnostic: Listing SYMROOT ==="
          ls -R $RUNNER_TEMP/Build
          echo "===================================="
          
          # Copy the compiled .app bundle to Payload directory
          cp -r $RUNNER_TEMP/Build/Release-iphoneos/WebDriverAgentRunner-Runner.app $EXPORT_DIR/Payload/
          
          # Compress to IPA format
          cd $EXPORT_DIR
          zip -r WebDriverAgentRunner.ipa Payload
          ls -la WebDriverAgentRunner.ipa

      - name: Upload WDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: ${{ runner.temp }}/Exported/WebDriverAgentRunner.ipa
