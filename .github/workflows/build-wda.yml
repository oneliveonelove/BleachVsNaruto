name: Build Unsigned WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v3
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Build and Archive WebDriverAgentRunner (Unsigned)
        run: |
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/WDA.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package IPA (Zip Payload)
        run: |
          EXPORT_DIR=$RUNNER_TEMP/Exported
          mkdir -p $EXPORT_DIR/Payload
          
          # Find the compiled .app bundle dynamically and copy to Payload directory
          APP_PATH=$(find $RUNNER_TEMP/WDA.xcarchive -name "*.app" -type d | head -n 1)
          echo "Found compiled app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app bundle found in archive!"
            exit 1
          fi
          
          cp -r "$APP_PATH" $EXPORT_DIR/Payload/
          
          # Compress to IPA format
          cd $EXPORT_DIR
          zip -r WebDriverAgentRunner.ipa Payload
          ls -la WebDriverAgentRunner.ipa

      - name: Upload WDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: ${{ runner.temp }}/Exported/WebDriverAgentRunner.ipa
