name: Build Unsigned WDA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v3
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Build and Archive WebDriverAgentRunner (Unsigned)
        run: |
          xcodebuild archive \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/WDA.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Create Export Options Plist
        run: |
          cat <<EOF > wda_export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Export WDA IPA (Unsigned)
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/WDA.xcarchive \
            -exportPath $RUNNER_TEMP/Exported \
            -exportOptionsPlist wda_export_options.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO

      - name: Upload WDA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner
          path: ${{ runner.temp }}/Exported/WebDriverAgentRunner.ipa
